publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.5.1
  record: ^7.1.1
  audioplayers: ^6.8.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
